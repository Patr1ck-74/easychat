services:
  easychat:
    build:
      context: .
      dockerfile: Dockerfile
    image: easychat:latest
    container_name: easychat
    ports:
      - "7777:7777"
    environment:
      EASYCHAT_ADMIN_PASSWORD: change-this-password
      DATA_DIR: /data
    restart: unless-stopped
    volumes:
      - easychat-data:/data

volumes:
  easychat-data:
